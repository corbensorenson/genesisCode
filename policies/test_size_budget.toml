version = 1

# Integration-test source size guard.
# This gate is independent from production source budgets and is focused on
# keeping agent-editable test crates modular.
test_max_lines = 2200
test_target_lines = 1000

# Burn-down policy:
# 1) No test file may exceed test_max_lines.
# 2) Files above test_target_lines must be explicitly listed here.
# 3) Stale entries (files now <= target) fail the guard and must be removed.
# 4) New files above target fail immediately unless intentionally added.
target_debt_allowlist = []

# Optional substring excludes for generated fixtures/support glue.
exclude_substrings = []
