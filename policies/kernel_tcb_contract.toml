version = 1

kernel_src_dir = "crates/gc_kernel/src"

# Explicit kernel source contract set (excluding tests).
# Any additions/removals require intentional policy updates.
expected_kernel_surface_files = [
  "compiled.rs",
  "compiled_blob.rs",
  "compiled_compile.rs",
  "compiled_coverage.rs",
  "compiled/trace_impl.rs",
  "compiled_runtime/apply.rs",
  "compiled_runtime/eval.rs",
  "compiled_runtime/metered.rs",
  "compiled_runtime/mod.rs",
  "compiled_runtime/primitive_forward.rs",
  "compiled_runtime/tail_loop.rs",
  "cycle.rs",
  "env.rs",
  "env/capture.rs",
  "error.rs",
  "eval.rs",
  "fallible_alloc.rs",
  "eval_coverage.rs",
  "eval_decimal_ops.rs",
  "eval_forms.rs",
  "eval_prims.rs",
  "eval_prims/text_bytes.rs",
  "eval_treewalk.rs",
  "eval_value_ops.rs",
  "free_vars.rs",
  "lib.rs",
  "logical_heap.rs",
  "value.rs",
  "value/collections.rs",
  "value/trace_impl.rs",
]

# Every production kernel file has exactly one architectural role. The reference
# evaluator cannot depend on optimized-tier implementation details, while tier
# bridges are explicit rather than silently expanding either side.
differential_test_file = "crates/gc_kernel/src/tests.rs"
required_differential_test_markers = [
  "reference_compiled_differential_matrix_covers_semantic_observables",
  "workload_recognizer_retirement_variants_preserve_semantic_observables",
  "recursive_module_cycles_are_reclaimed_after_treewalk_and_compiled_roots_retire",
  "indirect_container_cycles_are_reclaimed_across_repeated_sessions",
  "every_cycle_capable_value_edge_participates_in_reclamation",
  "logical_resource_counters_are_tier_exact_and_resettable",
  "logical_resource_limits_fail_one_unit_short_with_structured_sealed_context",
  "compiled_blob_declared_counts_are_bounded_by_remaining_input",
  "bulk_output_limits_preflight_before_construction_in_both_tiers",
  "fallible_bulk_allocation_rejects_capacity_overflow_without_panicking",
]

# Production dispatch cannot regain source- or benchmark-shaped execution under
# another filename. Retired paths stay absent, and optimized runtime files may
# not contain benchmark IDs, exact source symbols, literal-value matchers, or
# helper names that declare structural recognition. General compiler plans are
# derived from resolved semantic identities instead.
retired_kernel_paths = [
  "compiled_runtime/patterns.rs",
]
optimized_runtime_dir = "compiled_runtime"
forbidden_optimized_runtime_patterns = [
  '"(?:bench|core)/',
  '"PB-[0-9]+',
  'Term::Int\s*\(',
  'fn\s+(?:match|recognize)_[A-Za-z0-9_]*\s*\(',
  '(?:expected|result)_(?:descriptor|hash|value)',
]

# eval.rs must stay as boundary/orchestration; treewalk internals live in eval_treewalk.rs.
required_eval_markers = [
  "mod eval_treewalk;",
  "eval_treewalk::eval_term_impl",
]

forbidden_eval_markers = [
  "fn eval_term_impl(",
  "fn eval_list_tco(",
]

[cycle_ownership]
kernel_manifest = "crates/gc_kernel/Cargo.toml"
forbidden_manifest_markers = ["rpds"]
ordinary_rc_allowed_files = ["value.rs"]
ordinary_rc_expected_token_count = 6
ordinary_rc_required_markers = [
  "use std::rc::Rc;",
  "pub type Sym = Rc<str>;",
  "Data(Rc<Term>)",
  "Self::Data(Rc::new(term))",
]
required_owner_markers = [
  "Vector(Shared<ValueVector>)",
  "Map(Shared<ValueMap>)",
  "Closure(Shared<ClosureData>)",
  "CompiledClosure(Shared<CompiledClosureData>)",
  "NativeFn(Shared<NativeFn>)",
  "Contract(Shared<Contract>)",
  "EffectRequest(Shared<EffectRequest>)",
  "Shared<EnvFrame>",
  "Shared<Vec<Option<Value>>>",
  "Shared<RefCell<Vec<Option<Value>>>>",
  "Shared<Vec<Value>>",
]
required_trace_markers = [
  "unsafe impl Trace for Value",
  "unsafe impl Trace for ValueMap",
  "unsafe impl Trace for ValueVector",
  "unsafe impl Trace for ClosureData",
  "unsafe impl Trace for CompiledClosureData",
  "unsafe impl Trace for NativeFn",
  "unsafe impl Trace for Contract",
  "unsafe impl Trace for EffectProgram",
  "unsafe impl Trace for EffectRequest",
  "unsafe impl Trace for EnvFrame",
  "unsafe impl Trace for CompiledLexicalEnv",
  "unsafe impl Trace for CompiledModuleCells",
]
required_safe_point_markers = [
  "let outermost = !self.panic_guard_active();",
  "crate::cycle::collect_cycles",
  "cycle collection panicked",
]

[resource_metering]
required_source_markers = [
  "max_alloc_units",
  "max_live_units",
  "AllocationLedger",
  "logical_live_units",
  "core/resource-exhausted",
  "eval_metered_app_n",
  "try_reserve_exact",
  "host allocation failed",
]
required_test_markers = [
  "logical_term_and_constructor_units_are_exact",
  "live_units_are_alias_representation_independent",
  "live_units_terminate_on_recursive_environment_cycles",
  "logical_resource_counters_are_tier_exact_and_resettable",
  "logical_resource_limits_fail_one_unit_short_with_structured_sealed_context",
]

