"env/capture.rs" = "shared-semantics"
"error.rs" = "shared-semantics"
"eval.rs" = "shared-semantics"
"fallible_alloc.rs" = "shared-semantics"
"eval_coverage.rs" = "shared-semantics"
"eval_decimal_ops.rs" = "shared-semantics"
"eval_forms.rs" = "reference-semantics"
"eval_prims.rs" = "shared-semantics"
"eval_prims/text_bytes.rs" = "shared-semantics"
"eval_treewalk.rs" = "reference-semantics"
"eval_value_ops.rs" = "shared-semantics"
