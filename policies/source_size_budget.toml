version = 1

# AI-first maintainability budget:
# Keep production Rust source files below this size so edits remain focused and reviewable.
rust_max_lines = 2200

# AI-first GenesisCode authoring budget:
# Applies to source-of-truth .gc authoring files.
# Generated assembled artifacts are excluded below.
gc_max_lines = 1800

# Paths containing tests/bench fixtures are excluded from this production-code budget gate.
exclude_substrings = ["/tests/", "/benches/", "/examples/"]

# Explicit generated artifact carve-outs for .gc budget enforcement.
gc_exclude_paths = ["prelude/prelude.gc", "selfhost/toolchain.gc"]
