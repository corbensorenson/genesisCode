version = 1

# AI-first maintainability budget:
# Keep production Rust source files below this size so edits remain focused and reviewable.
rust_max_lines = 2200
rust_target_lines = 1600

# AI-first GenesisCode authoring budget:
# Applies to source-of-truth .gc authoring files.
# Generated assembled artifacts are excluded below.
gc_max_lines = 1800
gc_target_lines = 1200

# Authoritative .gc source roots (files or directories; directories are scanned recursively).
gc_source_roots = ["prelude/modules", "selfhost", "prelude/prelude.gc"]

# Paths containing tests/bench fixtures are excluded from this production-code budget gate.
exclude_substrings = ["/tests/", "/tests.rs", "/tests_", "_tests.rs", "/benches/", "/examples/"]

# Explicit generated artifact carve-outs for .gc budget enforcement.
# These are assembled artifacts committed for reproducibility, not authoring sources.
gc_generated_exclude_paths = ["prelude/prelude.gc", "selfhost/toolchain.gc"]

# Stage-rollout debt allowlists:
# Files listed here are legacy over target and are tracked separately as debt.
# Any new file over target (not listed here) fails CI/local gate immediately.
rust_target_exclude_paths = ["crates/gc_cli_driver/src/host_bridge_runtime.rs"]
gc_target_exclude_paths = []
