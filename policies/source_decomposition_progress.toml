version = 1

# Fail-closed decomposition progress budget for high-churn Rust production modules.
target_max_lines = 700

module_paths = [
  "crates/gc_cli_driver/src/cmd_selfhost.rs",
  "crates/gc_cli_driver/src/pkg_workspace_ops.rs",
  "crates/gc_obligations/src/obligation_exec.rs",
  "crates/gc_gfx/src/lib.rs",
  "crates/gc_prelude/src/prelude.rs",
  "crates/gc_cli_driver/src/semantic_workspace.rs",
  "crates/gc_patches/src/lib.rs",
  "crates/gc_kernel/src/eval.rs",
  "crates/gc_cli_driver/src/cmd_vcs.rs",
  "crates/gc_effects/src/runner_host_bridge.rs",
]

# Migration contract guardrails:
# - planned/status placeholders are disallowed once a module enters this table
# - minimum required phase is phase-1 (shared contract/data model migrated to GC modules)
required_min_phase = "phase-1"
disallowed_statuses = ["planned"]

[[migration_rows]]
module_path = "crates/gc_cli_driver/src/cmd_selfhost.rs"
target_gc_modules = ["selfhost/toolchain.gc", "selfhost/toolchain_manifest.gc"]
parity_gate = "bash scripts/check_selfhost_readiness_scorecard.sh"
phase = "phase-1"
status = "in-progress"

