[profile.default]
fail-fast = true
failure-output = "immediate-final"
success-output = "never"
status-level = "pass"
final-status-level = "slow"
slow-timeout = { period = "60s", terminate-after = 2 }

[profile.ci]
fail-fast = false
failure-output = "immediate-final"
success-output = "never"
status-level = "pass"
final-status-level = "slow"
slow-timeout = { period = "90s", terminate-after = 3 }
retries = { backoff = "exponential", count = 1, delay = "2s", max-delay = "15s", jitter = true }
