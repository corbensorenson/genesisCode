name: ci

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      profile:
        description: "CI profile to run"
        required: true
        default: standard
        type: choice
        options:
          - fast
          - standard
          - full
      test_shards_total:
        description: "Workspace test shard count (1 disables sharding)"
        required: true
        default: "1"
        type: string
      test_shard_index:
        description: "Workspace test shard index (0-based)"
        required: true
        default: "0"
        type: string
  schedule:
    - cron: "0 8 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GENESIS_ALLOW_RUST_ENGINE: "0"
      GENESIS_CI_PROFILE: ${{ github.event_name == 'schedule' && 'full' || github.event_name == 'workflow_dispatch' && github.event.inputs.profile || 'fast' }}
      GENESIS_TEST_SHARDS_TOTAL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_shards_total || '1' }}
      GENESIS_TEST_SHARD_INDEX: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_shard_index || '0' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve CI Profile
        run: |
          case "${GENESIS_CI_PROFILE}" in
            fast|standard|full) ;;
            *)
              echo "unsupported GENESIS_CI_PROFILE=${GENESIS_CI_PROFILE}"
              exit 1
              ;;
          esac
          echo "CI profile: ${GENESIS_CI_PROFILE}"
          [[ "${GENESIS_TEST_SHARDS_TOTAL}" =~ ^[0-9]+$ ]] || {
            echo "GENESIS_TEST_SHARDS_TOTAL must be numeric"
            exit 1
          }
          [[ "${GENESIS_TEST_SHARD_INDEX}" =~ ^[0-9]+$ ]] || {
            echo "GENESIS_TEST_SHARD_INDEX must be numeric"
            exit 1
          }
          if [[ "${GENESIS_TEST_SHARDS_TOTAL}" -lt 1 ]]; then
            echo "GENESIS_TEST_SHARDS_TOTAL must be >= 1"
            exit 1
          fi
          if [[ "${GENESIS_TEST_SHARD_INDEX}" -ge "${GENESIS_TEST_SHARDS_TOTAL}" ]]; then
            echo "GENESIS_TEST_SHARD_INDEX must be < GENESIS_TEST_SHARDS_TOTAL"
            exit 1
          fi
          echo "Test shard: ${GENESIS_TEST_SHARD_INDEX}/${GENESIS_TEST_SHARDS_TOTAL}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Selfhost Boundary Guard
        run: bash scripts/check_selfhost_boundary.sh

      - name: Old Bootstrap Retirement Guard
        run: bash scripts/check_old_bootstrap_retirement.sh

      - name: Host ABI Conformance Guard
        run: bash scripts/check_host_abi_conformance.sh

      - name: Runner High-Level Op Guard
        run: bash scripts/check_runner_high_level_op_guard.sh

      - name: Prelude Capability Coverage Guard
        run: bash scripts/check_prelude_capability_coverage.sh

      - name: Rust Engine Compat Guard
        run: bash scripts/check_rust_engine_compat.sh

      - name: Selfhost Default Profile Guard
        run: bash scripts/selfhost_default_profile_guard.sh

      - name: User-Path Panic Guard
        run: bash scripts/check_no_user_panics.sh

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: |
          if [[ "${GENESIS_CI_PROFILE}" == "fast" ]]; then
            bash scripts/test_fast.sh
          elif [[ "${GENESIS_TEST_SHARDS_TOTAL}" -gt 1 ]]; then
            bash scripts/test_shard_workspace.sh \
              --total "${GENESIS_TEST_SHARDS_TOTAL}" \
              --index "${GENESIS_TEST_SHARD_INDEX}" \
              --seed "${GITHUB_SHA}" \
              --out ".genesis/ci-shards" \
              --runner nextest \
              --exclude-crate "gc_wasi_cli"
          else
            # gc_wasi_cli command invariants are exercised by dedicated WASI smoke/strict lanes.
            cargo nextest run \
              --workspace \
              --cargo-profile selfhost-strict \
              --profile ci \
              --exclude gc_wasi_cli
          fi

      - name: Changed-File Fast Loop Budget
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: |
          BASE=""
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          fi
          if [[ -n "$BASE" ]]; then
            bash scripts/test_changed_fast.sh --base "$BASE" --runner nextest --min-history 1
          else
            bash scripts/test_changed_fast.sh --runner nextest --min-history 1
          fi

      - name: Upload Test Shard Artifacts
        if: ${{ always() && env.GENESIS_TEST_SHARDS_TOTAL != '1' }}
        uses: actions/upload-artifact@v4
        with:
          name: test-shard-${{ env.GENESIS_TEST_SHARD_INDEX }}-of-${{ env.GENESIS_TEST_SHARDS_TOTAL }}
          path: .genesis/ci-shards/
          if-no-files-found: error

      - name: Performance Budgets
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/check_perf_budgets.sh

      - name: AI Iteration SLO
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/check_ai_iteration_slo.sh

      - name: Hot Path Budgets
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/check_hot_path_budgets.sh

      - name: Runtime Microbench Budgets
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/check_runtime_microbench_budgets.sh

      - name: Upload Perf Trend Artifacts
        if: ${{ always() && (env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full') }}
        uses: actions/upload-artifact@v4
        with:
          name: perf-trend-artifacts
          path: |
            .genesis/perf/*.json
            .genesis/perf/*.jsonl
          if-no-files-found: warn

      - name: Selfhost Strict Smoke (Native + WASI CLI)
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/selfhost_strict_smoke.sh

      - name: Selfhost Strict Golden (Native + WASI CLI)
        if: ${{ env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/selfhost_strict_golden.sh

      - name: WASM Build (Pure Kernel)
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: cargo build -p gc_wasm --target wasm32-unknown-unknown

      - name: Install Node
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install wasm-bindgen-cli
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: cargo install wasm-bindgen-cli --version 0.2.108 --locked

      - name: WASM Bindings (Node) + Smoke Test
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: |
          bash scripts/wasm_bindgen_node.sh >/dev/null
          node scripts/wasm_node_smoke.mjs

      - name: WASM Cross-Host Determinism (Native vs Node)
        if: ${{ env.GENESIS_CI_PROFILE == 'full' }}
        run: |
          bash scripts/wasm_bindgen_node.sh >/dev/null
          node scripts/wasm_cross_host_determinism.mjs

      - name: Install JS Deps (Playwright)
        if: ${{ env.GENESIS_CI_PROFILE == 'full' }}
        run: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-fund --no-audit

      - name: Install Playwright Chromium
        if: ${{ env.GENESIS_CI_PROFILE == 'full' }}
        run: npx playwright install --with-deps chromium

      - name: WASM Bindings (Web) + Headless Browser Smoke
        if: ${{ env.GENESIS_CI_PROFILE == 'full' }}
        run: |
          bash scripts/wasm_bindgen_web.sh >/dev/null
          node scripts/wasm_web_smoke.mjs

      - name: Install wasmtime
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        uses: bytecodealliance/wasmtime-action@v1

      - name: WASI Build + Smoke (genesis_wasi.wasm)
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: |
          rustup target add wasm32-wasip1
          cargo build -p gc_wasi_cli --target wasm32-wasip1 --release
          bash scripts/wasi_smoke.sh target/wasm32-wasip1/release/genesis_wasi.wasm
