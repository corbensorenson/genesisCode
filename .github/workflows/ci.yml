name: ci

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      profile:
        description: "CI profile to run"
        required: true
        default: standard
        type: choice
        options:
          - fast
          - standard
          - full
      test_shards_total:
        description: "Workspace test shard count (1 disables sharding)"
        required: true
        default: "1"
        type: string
      test_shard_index:
        description: "Workspace test shard index (0-based)"
        required: true
        default: "0"
        type: string
  schedule:
    - cron: "0 8 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GENESIS_ALLOW_RUST_ENGINE: "0"
      # GitHub-hosted CPU runners must select the reviewed fallback profile explicitly.
      GENESIS_AGENT_GPU_PROFILE: "agent-gpu-fallback"
      GENESIS_CI_PROFILE: ${{ github.event_name == 'schedule' && 'full' || github.event_name == 'workflow_dispatch' && github.event.inputs.profile || github.event_name == 'pull_request' && 'standard' || 'fast' }}
      GENESIS_TEST_SHARDS_TOTAL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_shards_total || '1' }}
      GENESIS_TEST_SHARD_INDEX: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_shard_index || '0' }}
    steps:
      - uses: actions/checkout@v4
        # GenesisBench verifies frozen parent snapshots and must fail closed if history is absent.
        with:
          fetch-depth: 0

      - name: Resolve CI Profile
        run: |
          case "${GENESIS_CI_PROFILE}" in
            fast|standard|full) ;;
            *)
              echo "unsupported GENESIS_CI_PROFILE=${GENESIS_CI_PROFILE}"
              exit 1
              ;;
          esac
          echo "CI profile: ${GENESIS_CI_PROFILE}"
          [[ "${GENESIS_TEST_SHARDS_TOTAL}" =~ ^[0-9]+$ ]] || {
            echo "GENESIS_TEST_SHARDS_TOTAL must be numeric"
            exit 1
          }
          [[ "${GENESIS_TEST_SHARD_INDEX}" =~ ^[0-9]+$ ]] || {
            echo "GENESIS_TEST_SHARD_INDEX must be numeric"
            exit 1
          }
          if [[ "${GENESIS_TEST_SHARDS_TOTAL}" -lt 1 ]]; then
            echo "GENESIS_TEST_SHARDS_TOTAL must be >= 1"
            exit 1
          fi
          if [[ "${GENESIS_TEST_SHARD_INDEX}" -ge "${GENESIS_TEST_SHARDS_TOTAL}" ]]; then
            echo "GENESIS_TEST_SHARD_INDEX must be < GENESIS_TEST_SHARDS_TOTAL"
            exit 1
          fi
          echo "Test shard: ${GENESIS_TEST_SHARD_INDEX}/${GENESIS_TEST_SHARDS_TOTAL}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown, wasm32-wasip1

      - name: Resolve Cargo Cache
        shell: bash
        run: python3 scripts/lib/cargo_cache.py --root . --scope root-host --format github-env >> "$GITHUB_ENV"

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest@0.9.137

      - name: Install cargo-deny
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.0

      - name: Fetch Offline Gate Dependencies
        run: |
          cargo fetch --locked
          cargo fetch --manifest-path tools/genesis-evidence-producer/Cargo.toml --locked
          cargo fetch --manifest-path tools/genesis-evidence-verifier/Cargo.toml --locked

      - name: Prerequisite Manifest Guard
        run: bash scripts/check_prerequisite_manifest.sh

      - name: Reference Host Profile Guard
        run: bash scripts/check_reference_host_profiles.sh

      - name: Roadmap Workload Normalization Guard
        run: bash scripts/check_roadmap_workloads.sh

      - name: Signed Roadmap Baseline Guard
        run: bash scripts/check_roadmap_baseline.sh

      - name: Dependency Mirror Contract Guard
        run: bash scripts/check_dependency_mirror_contract.sh

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Selfhost Boundary Guard
        run: bash scripts/check_selfhost_boundary.sh --strict

      - name: Rust Bootstrap Retirement Gate
        run: |
          STRICT_RELEASE=1
          if [[ "${GENESIS_CI_PROFILE}" == "fast" ]]; then
            STRICT_RELEASE=0
          fi
          GENESIS_BOOTSTRAP_RETIREMENT_STRICT_RELEASE="$STRICT_RELEASE" \
            bash scripts/check_bootstrap_retirement_gate.sh

      - name: Host ABI Conformance Guard
        run: bash scripts/check_host_abi_conformance.sh

      - name: Runner High-Level Op Guard
        run: bash scripts/check_runner_high_level_op_guard.sh

      - name: Prelude Capability Coverage Guard
        run: bash scripts/check_prelude_capability_coverage.sh

      - name: Foundation Stdlib Conformance Guard
        run: bash scripts/check_foundation_stdlib_conformance.sh

      - name: Capability Indices Guard
        run: bash scripts/check_capability_indices.sh

      - name: Generated Artifact Policy Guard
        run: bash scripts/check_generated_artifact_policy.sh

      - name: Genesis Evidence Profile Guard
        run: bash scripts/check_genesis_evidence_profile.sh

      - name: Genesis Evidence Verifier Guard
        run: bash scripts/check_genesis_evidence_verifier.sh

      - name: Evidence Adversarial Matrix Guard
        run: bash scripts/check_evidence_adversarial_matrix.sh

      - name: Evidence Storage Classes Guard
        run: bash scripts/check_evidence_storage_classes.sh

      - name: Check Update Boundary Guard
        run: bash scripts/check_check_update_boundary.sh

      - name: Gate Resource Telemetry Guard
        run: bash scripts/check_gate_resource_telemetry.sh

      - name: Deterministic Cleanup Guard
        run: bash scripts/check_deterministic_cleanup.sh

      - name: Gate Manifest Guard
        run: bash scripts/check_gate_manifest.sh

      - name: Engineering Gate Budget Guard
        run: bash scripts/check_engineering_gate_contract.sh

      - name: Generated Release Notes Guard
        run: bash scripts/check_release_notes.sh

      - name: Versioning Release Hygiene Guard
        run: bash scripts/check_versioning_release_hygiene.sh

      - name: Version Surfaces Guard
        run: bash scripts/check_version_surfaces.sh

      - name: V1 Compatibility Registry Guard
        run: bash scripts/check_v1_compatibility.sh

      - name: Supply Chain Guard
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/check_supply_chain.sh

      - name: Release Smoke Gate
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/check_release_smoke.sh

      - name: Assurance Profile Pack Guard
        run: bash scripts/check_assurance_profile_packs.sh

      - name: Agent Authoring Bundle Guard
        run: bash scripts/check_agent_authoring_bundle.sh

      - name: GC Agent Profile Guard
        run: bash scripts/check_gc_agent_profile.sh

      - name: GC Agent Core Card Guard
        run: bash scripts/check_gc_agent_core_card.sh

      - name: GC Agent Task Cards Guard
        run: bash scripts/check_gc_agent_task_cards.sh

      - name: GC Agent Symbol Index Guard
        run: bash scripts/check_gc_agent_symbol_index.sh

      - name: GenesisCode Authoring Skill Guard
        run: bash scripts/check_genesiscode_authoring_skill.sh

      - name: Domain Kit Workflow Guard
        run: bash scripts/check_domain_kit_workflows.sh

      - name: Backend Starter Workflow Evidence
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/update_backend_starter_workflows_report.sh

      - name: Domain Starter Registry Bootstrap Evidence
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/update_domain_starter_registry_bootstrap_report.sh

      - name: Selfhost Refactor Guard
        run: bash scripts/check_selfhost_refactor_guard.sh

      - name: Selfhost Dashboard Freshness Guard
        run: bash scripts/check_selfhost_dashboard_fresh.sh

      - name: Red-Team Report Guard
        run: bash scripts/check_redteam_report.sh

      - name: User-Path Panic Guard
        run: bash scripts/check_no_user_panics.sh

      - name: User-Path Panic Compiler Assurance
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/check_no_user_panics_compiler.sh

      - name: Rust Engine Compatibility Guard
        run: bash scripts/check_rust_engine_compat.sh

      - name: Production CLI Parse Surface Guard
        run: bash scripts/check_production_cli_parse_surface.sh

      - name: Production CLI Help Surface Guard
        run: bash scripts/check_production_cli_help_surface.sh

      - name: CLI Diagnostics Contract Guard
        run: bash scripts/check_cli_diagnostics_contract.sh

      - name: Fuzz + Differential Hardening Guard
        run: bash scripts/check_fuzz_differential_hardening.sh

      - name: Test Execution Profile Matrix Guard
        run: bash scripts/check_test_execution_profile_matrix.sh

      - name: Changed Impact Contract Guard
        run: bash scripts/check_changed_impact.sh

      - name: Docs Quickstart Gate
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/check_docs_quickstart.sh

      - name: GPU Conformance Lane Matrix Guard
        run: bash scripts/check_gpu_conformance_lane_matrix.sh

      - name: Source Size Budget Guard
        run: bash scripts/check_source_size_budget.sh

      - name: GC Source Size Budget Guard
        run: bash scripts/check_gc_source_size_budget.sh

      - name: Test Size Budget Guard
        run: bash scripts/check_test_size_budget.sh

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked --offline -- -D warnings

      - name: Runtime Backend Feature Matrix Guard
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/update_runtime_backend_feature_matrix_report.sh

      - name: Test
        run: |
          source scripts/lib/cargo_target_dir.sh
          genesis_configure_cargo_target_dir "$PWD" "workspace-test" root-host
          trap 'genesis_clear_resolved_cargo_target_dir "workspace-test-exit"' EXIT
          if [[ "${GENESIS_CI_PROFILE}" == "fast" ]]; then
            bash scripts/test_fast.sh
          elif [[ "${GENESIS_TEST_SHARDS_TOTAL}" -gt 1 ]]; then
            bash scripts/test_shard_workspace.sh \
              --total "${GENESIS_TEST_SHARDS_TOTAL}" \
              --index "${GENESIS_TEST_SHARD_INDEX}" \
              --seed "${GITHUB_SHA}" \
              --out ".genesis/ci-shards" \
              --runner nextest
          else
            cargo nextest run \
              --workspace \
              --cargo-profile selfhost-strict \
              --profile ci
          fi

      - name: Changed-File Fast Loop Budget
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: |
          BASE=""
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          fi
          if [[ -n "$BASE" ]]; then
            bash scripts/test_changed_fast.sh --base "$BASE" --runner nextest --min-history 1
          else
            bash scripts/test_changed_fast.sh --runner nextest --min-history 1
          fi

      - name: Ignored Perf Gate Regression Tests
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/test_perf_gates.sh

      - name: Local Workspace Test Contract (CI unset)
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: env -u CI cargo test --workspace --profile selfhost-strict

      - name: Upload Test Shard Artifacts
        if: ${{ always() && env.GENESIS_TEST_SHARDS_TOTAL != '1' }}
        uses: actions/upload-artifact@v4
        with:
          name: test-shard-${{ env.GENESIS_TEST_SHARD_INDEX }}-of-${{ env.GENESIS_TEST_SHARDS_TOTAL }}
          path: .genesis/ci-shards/
          if-no-files-found: error

      - name: Performance Budgets
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/update_perf_budgets_report.sh

      - name: AI Iteration SLO
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/update_ai_iteration_slo_report.sh

      - name: AI Stress Suite (Tasks + Bridge + GPU/Compute)
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/update_ai_stress_suite_report.sh

      - name: Hot Path Budgets
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/update_hot_path_budgets_report.sh

      - name: Runtime Microbench Budgets
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/update_runtime_microbench_budgets_report.sh

      - name: Runtime Workload Budgets
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/update_runtime_workload_budgets_report.sh

      - name: GPU Compute Runtime Profile (Compute-Only)
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/update_gpu_compute_runtime_profile_report.sh

      - name: Upload Perf Trend Artifacts
        if: ${{ always() && (env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full') }}
        uses: actions/upload-artifact@v4
        with:
          name: perf-trend-artifacts
          path: |
            .genesis/perf/*.json
            .genesis/perf/*.jsonl
          if-no-files-found: warn

      - name: Selfhost Strict Smoke (Native + WASI CLI)
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/selfhost_strict_smoke.sh

      - name: Agent Capability Gauntlet (Selfhost-Only)
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/check_agent_reference_workflows.sh

      - name: Agent End-to-End Scenario Perf Gate
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/check_agent_scenario_perf.sh

      - name: Agent Generative Workload Gate
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/check_agent_generative_workloads.sh

      - name: Selfhost Strict Golden (Native + WASI CLI)
        if: ${{ env.GENESIS_CI_PROFILE == 'full' && github.event_name != 'pull_request' }}
        run: bash scripts/selfhost_strict_golden.sh

      - name: WASM Build (Pure Kernel)
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: |
          source scripts/lib/cargo_target_dir.sh
          genesis_configure_cargo_target_dir "$PWD" ci-wasm-build root-wasm
          cargo build -p gc_wasm --target wasm32-unknown-unknown

      - name: Install Node
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare Content-Addressed Dependency Mirror
        if: ${{ env.GENESIS_CI_PROFILE == 'full' }}
        run: |
          mirror="$(bash scripts/update_dependency_mirror.sh --format path)"
          echo "GENESIS_DEPENDENCY_MIRROR=${mirror}" >> "$GITHUB_ENV"

      - name: Clean Offline Build With Hard Network Denial
        if: ${{ env.GENESIS_CI_PROFILE == 'full' }}
        run: bash scripts/test_offline_dependency_mirror.sh --mirror "$GENESIS_DEPENDENCY_MIRROR"

      - name: Install wasm-bindgen-cli
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: cargo install wasm-bindgen-cli --version 0.2.108 --locked

      - name: WASM Bindings (Node) + Smoke Test
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: |
          wasm_js_path="$(bash scripts/wasm_bindgen_node.sh | tail -n 1)"
          node scripts/wasm_node_smoke.mjs "$wasm_js_path"

      - name: WASM Cross-Host Determinism (Native vs Node)
        if: ${{ env.GENESIS_CI_PROFILE == 'full' && github.event_name != 'pull_request' }}
        run: |
          wasm_js_path="$(bash scripts/wasm_bindgen_node.sh | tail -n 1)"
          node scripts/wasm_cross_host_determinism.mjs "$wasm_js_path"

      - name: Full Cross-Host Runtime Budget Gate
        if: ${{ env.GENESIS_CI_PROFILE == 'full' && github.event_name != 'pull_request' }}
        run: bash scripts/update_full_cross_host_profile_budget_report.sh

      - name: Install JS Deps (Playwright)
        if: ${{ env.GENESIS_CI_PROFILE == 'full' }}
        run: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-fund --no-audit

      - name: Install Playwright Chromium
        if: ${{ env.GENESIS_CI_PROFILE == 'full' }}
        run: npx playwright install --with-deps chromium

      - name: WASM Bindings (Web) + Headless Browser Smoke
        if: ${{ env.GENESIS_CI_PROFILE == 'full' }}
        run: |
          bash scripts/wasm_bindgen_web.sh >/dev/null
          node scripts/wasm_web_smoke.mjs

      - name: Install wasmtime
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        uses: bytecodealliance/actions/wasmtime/setup@v1
        with:
          version: 36.0.9

      - name: WASI Build + Smoke (genesis_wasi.wasm)
        if: ${{ env.GENESIS_CI_PROFILE == 'standard' || env.GENESIS_CI_PROFILE == 'full' }}
        run: |
          source scripts/lib/cargo_target_dir.sh
          genesis_configure_cargo_target_dir "$PWD" ci-wasi-build root-wasi
          cargo build -p gc_wasi_cli --target wasm32-wasip1 --release
          bash scripts/wasi_smoke.sh "$CARGO_TARGET_DIR/wasm32-wasip1/release/genesis_wasi.wasm"

  pr_strict_equivalence_gate:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    env:
      GENESIS_ALLOW_RUST_ENGINE: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0
          targets: wasm32-unknown-unknown

      - name: Resolve Cargo Cache
        shell: bash
        run: python3 scripts/lib/cargo_cache.py --root . --scope root-host --format github-env >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2

      - name: Selfhost Strict Golden (PR Required)
        run: bash scripts/selfhost_strict_golden.sh

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.108 --locked

      - name: WASM Cross-Host Determinism (PR Required)
        run: |
          wasm_js_path="$(bash scripts/wasm_bindgen_node.sh | tail -n 1)"
          node scripts/wasm_cross_host_determinism.mjs "$wasm_js_path"

      - name: Full Cross-Host Runtime Budget Gate (PR Required)
        run: bash scripts/update_full_cross_host_profile_budget_report.sh

  webxr_browser_conformance:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      GENESIS_ALLOW_RUST_ENGINE: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install JS Deps (Playwright)
        run: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-fund --no-audit

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser-Native WebXR Conformance (Deterministic Capture/Replay)
        run: bash scripts/update_webxr_browser_conformance_report.sh

      - name: Upload WebXR Browser Conformance Artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: webxr-browser-conformance-artifacts
          path: .genesis/perf/webxr_browser_conformance_report.json
          if-no-files-found: warn

  gpu_device_microbench:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'full') }}
    runs-on: [self-hosted, linux, x64, gpu]
    env:
      GENESIS_ALLOW_RUST_ENGINE: "0"
      GENESIS_RUNTIME_MICROBENCH_FEATURES: "device-bridge"
      GENESIS_GPU_COMPUTE_BACKEND_POLICY: "require-device"
      GENESIS_RUNTIME_MICROBENCH_REQUIRED_GPU_BACKEND: "device-runtime"
      GENESIS_GPU_DEVICE_CONFORMANCE_OUT_DIR: ".genesis/perf/gpu_device_conformance"
      GENESIS_GPU_DEVICE_CONFORMANCE_REPORT_OUT: ".genesis/perf/gpu_device_conformance_report.json"
      GENESIS_BUDGET_MICRO_GPU_COMPUTE_SUBMIT_MS_DEVICE: "5000"
      GENESIS_BUDGET_MICRO_GPU_COMPUTE_SUBMIT_MS_FALLBACK: "8000"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0

      - name: Resolve Cargo Cache
        shell: bash
        run: python3 scripts/lib/cargo_cache.py --root . --scope root-host --format github-env >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2

      - name: Device Bridge Replay Determinism (Feature Gate)
        run: cargo test -p gc_runtime_bench --features device-bridge --test device_bridge_replay --quiet

      - name: GPU Device Conformance Lane (Require Device Backend)
        run: bash scripts/update_gpu_compute_device_conformance_report.sh

      - name: Upload GPU Perf Artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: gpu-device-conformance-artifacts-selfhosted-linux
          path: |
            .genesis/perf/gpu_device_conformance/
            .genesis/perf/gpu_device_conformance_report.json
          if-no-files-found: warn

  gpu_device_microbench_deterministic:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      GENESIS_ALLOW_RUST_ENGINE: "0"
      GENESIS_GPU_DEVICE_CONFORMANCE_OUT_DIR: ".genesis/perf/gpu_device_conformance_deterministic"
      GENESIS_GPU_DEVICE_CONFORMANCE_REPORT_OUT: ".genesis/perf/gpu_device_conformance_deterministic_report.json"
      GENESIS_GPU_DEVICE_CONFORMANCE_FEATURES: ""
      GENESIS_GPU_COMPUTE_BACKEND_POLICY: "require-device"
      GENESIS_GPU_COMPUTE_DEVICE_RUNTIME_CMD: "${{ github.workspace }}/scripts/gpu_device_runtime_deterministic.sh"
      GENESIS_RUNTIME_MICROBENCH_REQUIRED_GPU_BACKEND: "device-runtime"
      GENESIS_BUDGET_MICRO_GPU_COMPUTE_SUBMIT_MS_DEVICE: "5000"
      GENESIS_BUDGET_MICRO_GPU_COMPUTE_SUBMIT_MS_FALLBACK: "8000"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0

      - name: Resolve Cargo Cache
        shell: bash
        run: python3 scripts/lib/cargo_cache.py --root . --scope root-host --format github-env >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2

      - name: GPU Device Conformance Lane (Deterministic Runner)
        run: bash scripts/update_gpu_compute_device_conformance_report.sh

      - name: Upload GPU Perf Artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: gpu-device-conformance-artifacts-deterministic
          path: |
            .genesis/perf/gpu_device_conformance_deterministic/
            .genesis/perf/gpu_device_conformance_deterministic_report.json
          if-no-files-found: warn

  gpu_device_conformance_release_gate:
