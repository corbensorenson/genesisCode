name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: WASM Build (Pure Kernel)
        run: cargo build -p gc_wasm --target wasm32-unknown-unknown

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.108 --locked

      - name: WASM Bindings (Node) + Smoke Test
        run: |
          bash scripts/wasm_bindgen_node.sh >/dev/null
          node scripts/wasm_node_smoke.mjs

      - name: WASM Cross-Host Determinism (Native vs Node)
        run: |
          bash scripts/wasm_bindgen_node.sh >/dev/null
          node scripts/wasm_cross_host_determinism.mjs
