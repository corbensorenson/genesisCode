name: GenesisCode Documentation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "*.md"
      - "_quarto.yml"
      - "index.qmd"
      - "learn/**"
      - "guides/**"
      - "reference/**"
      - "site_assets/**"
      - "docs/**"
      - "examples/**"
      - "policies/**"
      - "genesis.*"
      - "package.json"
      - "package-lock.json"
      - "rust-toolchain.toml"
      - "llms.txt"
      - "scripts/render_quarto_reference.py"
      - "scripts/check_quarto_site.py"
      - "scripts/stamp_quarto_site.py"
      - "scripts/check_quarto_deployment.py"
      - ".github/workflows/docs-site.yml"
  push:
    branches: [master]
    paths:
      - "*.md"
      - "_quarto.yml"
      - "index.qmd"
      - "learn/**"
      - "guides/**"
      - "reference/**"
      - "site_assets/**"
      - "docs/**"
      - "examples/**"
      - "policies/**"
      - "genesis.*"
      - "package.json"
      - "package-lock.json"
      - "rust-toolchain.toml"
      - "llms.txt"
      - "scripts/render_quarto_reference.py"
      - "scripts/check_quarto_site.py"
      - "scripts/stamp_quarto_site.py"
      - "scripts/check_quarto_deployment.py"
      - ".github/workflows/docs-site.yml"

permissions:
  contents: read

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2
        with:
          version: 1.9.38

      - name: Verify generated reference freshness
        run: python3 scripts/render_quarto_reference.py --check

      - name: Render documentation
        env:
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
        run: |
          rm -rf _site
          quarto render

      - name: Validate rendered documentation
        run: python3 scripts/check_quarto_site.py --expected-commit "$GITHUB_SHA" --require-clean

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: _site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  attest:
    name: Attest public documentation
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: deploy
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Crawl commit-bound Pages deployment
        run: >-
          python3 scripts/check_quarto_deployment.py
          --url "${{ needs.deploy.outputs.page_url }}"
          --expected-commit "$GITHUB_SHA"
